# meta-layer-write — Cloudflare Worker yapılandırması.
# Statik site (GH-Pages) bu Worker'ı ayrı endpoint olarak çağırır.
#
# [vars] = NON-SECRET, repoya girer. Owner/repo/branch/inbox-path burada (HARDCODE değil, tek yer).
# Secret'ler BURAYA YAZILMAZ → `wrangler secret put GITHUB_TOKEN` vb. (bkz README.md).

name = "meta-layer-write"
main = "worker.js"
compatibility_date = "2025-09-23"

[vars]
GH_OWNER = "kasimecer"
GH_REPO = "meta-layer-dashboard"
GH_BRANCH = "main"
# Partner cevapları bu dosyaya APPEND edilir. Drive'daki kanonik inbox'tan AYRI bir
# git-kanalı (seam): loop bunu uzlaştırıp projeler/<proje>/inbox.md'ye taşır.
# Çok-proje olunca proje başına yol gerekebilir; v1 = tek dosya (Barış).
INBOX_PATH = "partner-inbox/baris.md"
# Intake taslakları bu dizine <id>.json olarak commit edilir; yerel izleyici
# (scripts/intake-queue-watch.mjs) buradan okuyup materyalize eder.
INTAKE_QUEUE_PATH = "intake-kuyruk"
# Planlama soru-yanıt gönderimleri bu dizine <projeId>--<asama>--v<surum>.json olarak commit
# edilir; yerel izleyici (scripts/soru-yanit-queue-watch.mjs) buradan okuyup planlama SORU–YANIT
# artefaktına yazar. Pipeline'ı BAŞLATMAZ/İLERLETMEZ.
SORU_YANIT_QUEUE_PATH = "soru-yanit-kuyruk"
# CORS + origin-allowlist. Virgülle çok-origin. Lokal test için localhost eklendi (bkz README
# "Lokal geliştirme" — worker/soru-yanit-queue canlı-demo doğrulaması için).
ALLOWED_ORIGIN = "https://kasimecer.github.io,http://localhost:5173"
